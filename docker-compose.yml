services:
  mongodb:
    image: mongo:7
    container_name: cityflow-mongodb
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-password}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-cityflow}
    volumes:
      - mongodb_data:/data/db
      - ./seed/mongodb/init.js:/docker-entrypoint-initdb.d/init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "-u", "${MONGO_ROOT_USER:-admin}", "-p", "${MONGO_ROOT_PASSWORD:-password}", "--authenticationDatabase", "admin", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  mongo-express:
    image: mongo-express:1.0.2-20
    container_name: cityflow-mongo-express
    restart: unless-stopped
    ports:
      - "${MONGO_EXPRESS_PORT:-8081}:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USER:-admin}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASSWORD:-password}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-password}@mongodb:27017/
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      mongodb:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: cityflow-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-seed:
    image: redis:7-alpine
    container_name: cityflow-redis-seed
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./seed/redis/init.sh:/init.sh:ro
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    entrypoint: ["/bin/sh", "/init.sh"]
    restart: "no"

  cassandra:
    image: cassandra:4.1
    container_name: cityflow-cassandra
    restart: unless-stopped
    ports:
      - "${CASSANDRA_PORT:-9042}:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: CityFlowCluster
      MAX_HEAP_SIZE: 512M
      HEAP_NEWSIZE: 128M
    volumes:
      - cassandra_data:/var/lib/cassandra
      - ./seed/cassandra:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'SELECT now() FROM system.local' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s

  neo4j:
    image: neo4j:5.15-community
    container_name: cityflow-neo4j
    restart: unless-stopped
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/cityflow2024}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s

  neo4j-seed:
    image: neo4j:5.15-community
    container_name: cityflow-neo4j-seed
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ./seed/neo4j/init.cypher:/init.cypher:ro
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/cityflow2024}
    entrypoint: >
      /bin/sh -c "
      PASS=$${NEO4J_AUTH#*/} &&
      cypher-shell -a bolt://neo4j:7687 -u neo4j -p $$PASS -f /init.cypher
      "
    restart: "no"

volumes:
  mongodb_data:
  redis_data:
  cassandra_data:
  neo4j_data:
